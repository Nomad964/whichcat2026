<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Какой ты кот? — Квиз сообщества «ИИ Коты всегда рядом»</title>
<style>
/* ─── RESET & BASE ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #060610;
  color: #fff;
  overflow-x: hidden;
}

/* ─── ANIMATED BACKGROUND ─── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 20% 20%, #1a0a3a 0%, transparent 55%),
              radial-gradient(ellipse at 80% 80%, #0a1a3a 0%, transparent 55%),
              radial-gradient(ellipse at 50% 50%, #0d0618 0%, #060610 100%);
}
.orb {
  position: fixed; border-radius: 50%;
  filter: blur(80px); opacity: .55; z-index: 0;
  animation: orbFloat linear infinite;
  pointer-events: none;
}
.orb1 { width:500px;height:500px;background:#4f1fff;top:-150px;left:-100px;animation-duration:22s; }
.orb2 { width:400px;height:400px;background:#0a4fff;bottom:-100px;right:-80px;animation-duration:28s;animation-delay:-8s; }
.orb3 { width:320px;height:320px;background:#8b1fff;top:40%;left:60%;animation-duration:18s;animation-delay:-5s; }
.orb4 { width:250px;height:250px;background:#1a88ff;top:20%;right:20%;animation-duration:24s;animation-delay:-12s; }
@keyframes orbFloat {
  0%,100%  { transform: translate(0,0) scale(1); }
  25%      { transform: translate(30px,-40px) scale(1.08); }
  50%      { transform: translate(-20px,25px) scale(.95); }
  75%      { transform: translate(40px,15px) scale(1.04); }
}

/* ─── WRAPPER ─── */
#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px 16px;
}

/* ─── GLASS CARD ─── */
.glass {
  background: rgba(255,255,255,.07);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid rgba(255,255,255,.13);
  border-radius: 28px;
  box-shadow: 0 8px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
}

/* ─── SCREEN TRANSITIONS ─── */
.screen {
  width: 100%; max-width: 700px;
  display: none; opacity: 0;
  transform: translateY(20px);
  transition: opacity .4s ease, transform .4s ease;
}
.screen.active {
  display: block; opacity: 1; transform: translateY(0);
}
.screen.fade-out { opacity: 0; transform: translateY(-20px); }

/* ─── CAROUSEL ─── */
.carousel-outer {
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  overflow: hidden;
  position: relative;
  margin-bottom: 20px;
  padding: 4px 0;
}
.carousel-outer::before,
.carousel-outer::after {
  content: ''; position: absolute;
  top: 0; bottom: 0; width: 80px; z-index: 2; pointer-events: none;
}
.carousel-outer::before { left: 0;  background: linear-gradient(to right, #060610 20%, transparent); }
.carousel-outer::after  { right: 0; background: linear-gradient(to left,  #060610 20%, transparent); }

.carousel-track {
  display: flex; gap: 12px;
  width: max-content;
  animation: marquee 32s linear infinite;
}
.carousel-track:hover { animation-play-state: paused; }
@keyframes marquee {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.cat-slide {
  width: 148px; height: 148px; border-radius: 18px;
  overflow: hidden; flex-shrink: 0; position: relative;
  border: 1px solid rgba(255,255,255,.14);
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  cursor: pointer;
  transition: transform .3s ease, box-shadow .3s ease;
}
.cat-slide:hover {
  transform: scale(1.07) translateY(-4px);
  box-shadow: 0 10px 36px rgba(124,58,237,.45);
  border-color: rgba(167,139,250,.5);
}
.cat-slide img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.cat-slide-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 22px 8px 8px;
  background: linear-gradient(to top, rgba(0,0,0,.82) 0%, transparent 100%);
  font-size: 11px; font-weight: 700; text-align: center;
  color: rgba(255,255,255,.9); letter-spacing: .4px;
  line-height: 1.2;
}

/* ─── START SCREEN ─── */
#startScreen { text-align: center; }
.start-card {
  padding: 36px 40px 40px;
}
.logo-cats { font-size: 52px; margin-bottom: 12px; animation: catBounce 2s ease-in-out infinite; }
@keyframes catBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.quiz-title {
  font-size: clamp(28px, 6vw, 42px);
  font-weight: 900;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #f0abfc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.15; margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.quiz-subtitle {
  font-size: 16px; color: rgba(255,255,255,.55);
  margin-bottom: 32px; letter-spacing: .3px;
}
.quiz-meta {
  display: flex; align-items: center; justify-content: center;
  gap: 24px; margin-bottom: 36px; flex-wrap: wrap;
}
.meta-badge {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
  border-radius: 20px; padding: 7px 16px;
  font-size: 13px; color: rgba(255,255,255,.75);
}
.meta-badge span { font-size: 16px; }

.btn-start {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 18px 52px; font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, #7c3aed, #3b82f6);
  border: none; border-radius: 50px; color: #fff;
  cursor: pointer; letter-spacing: .5px;
  box-shadow: 0 4px 32px rgba(124,58,237,.5);
  transition: transform .15s, box-shadow .15s;
  animation: btnPulse 2.5s ease-in-out infinite;
}
.btn-start:hover { transform: scale(1.04); box-shadow: 0 6px 42px rgba(124,58,237,.7); }
.btn-start:active { transform: scale(.97); }
@keyframes btnPulse {
  0%,100%{box-shadow:0 4px 32px rgba(124,58,237,.5)}
  50%{box-shadow:0 4px 48px rgba(124,58,237,.75)}
}
.vk-credit {
  margin-top: 20px; font-size: 13px;
  color: rgba(255,255,255,.3); letter-spacing: .3px;
}
.vk-credit a { color: rgba(139,92,246,.7); text-decoration: none; }

/* ─── QUIZ SCREEN ─── */
#quizScreen {}
.quiz-card { padding: 36px 36px 28px; }

.progress-wrap {
  display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
}
.progress-text {
  font-size: 13px; color: rgba(255,255,255,.45); white-space: nowrap; min-width: 56px;
}
.progress-bar-bg {
  flex: 1; height: 6px; background: rgba(255,255,255,.1);
  border-radius: 3px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #7c3aed, #3b82f6);
  border-radius: 3px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 10px rgba(124,58,237,.6);
}

.q-number {
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(139,92,246,.8); margin-bottom: 10px; font-weight: 600;
}
.q-text {
  font-size: clamp(18px, 3.5vw, 22px);
  font-weight: 700; line-height: 1.35;
  color: rgba(255,255,255,.95);
  margin-bottom: 28px; min-height: 60px;
  transition: opacity .25s, transform .25s;
}
.q-text.changing { opacity: 0; transform: translateX(-15px); }

.answers-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px;
  transition: opacity .25s, transform .25s;
}
.answers-grid.changing { opacity: 0; transform: translateX(-15px); }

@media (max-width: 520px) {
  .answers-grid { grid-template-columns: 1fr; }
  .quiz-card { padding: 24px 20px 20px; }
}

.answer-btn {
  position: relative;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px; padding: 16px 18px;
  color: rgba(255,255,255,.88); font-size: 15px;
  font-family: inherit; text-align: left;
  cursor: pointer; line-height: 1.4;
  transition: all .2s ease;
  overflow: hidden;
}
.answer-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(124,58,237,.0), rgba(59,130,246,.0));
  border-radius: 16px;
  transition: opacity .2s;
  opacity: 0;
}
.answer-btn:hover {
  border-color: rgba(139,92,246,.5);
  background: rgba(139,92,246,.12);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(124,58,237,.25);
  color: #fff;
}
.answer-btn:hover::before { opacity: 1; }
.answer-btn:active { transform: translateY(0) scale(.98); }
.answer-btn.selected {
  border-color: rgba(139,92,246,.8);
  background: rgba(124,58,237,.25);
  color: #fff;
  box-shadow: 0 4px 20px rgba(124,58,237,.4);
}
.answer-letter {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 8px;
  background: rgba(139,92,246,.2); border: 1px solid rgba(139,92,246,.3);
  font-size: 12px; font-weight: 700; color: #a78bfa;
  margin-right: 10px; flex-shrink: 0; vertical-align: middle;
}

/* ─── LOADING SCREEN ─── */
#loadingScreen { text-align: center; }
.loading-card { padding: 60px 40px; }
.loading-cats { font-size: 48px; animation: spin 1.5s linear infinite; display: inline-block; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.loading-text {
  font-size: 20px; font-weight: 700; margin-top: 20px;
  background: linear-gradient(135deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.loading-sub { font-size: 14px; color: rgba(255,255,255,.4); margin-top: 8px; }

/* ─── RESULT SCREEN ─── */
#resultScreen {}
.result-card { padding: 0; overflow: hidden; }

.result-image-wrap {
  position: relative; width: 100%;
  padding-top: 62%; overflow: hidden;
  border-radius: 28px 28px 0 0;
}
.result-image-wrap img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .6s ease;
}
.result-image-wrap:hover img { transform: scale(1.03); }
.result-image-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(6,6,16,.95) 100%);
}
.result-type-badge {
  position: absolute; top: 16px; left: 16px;
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px; padding: 6px 16px;
  font-size: 12px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(255,255,255,.9);
}
.result-name-overlay {
  position: absolute; bottom: 20px; left: 24px; right: 24px;
}
.result-emoji-big { font-size: 36px; line-height: 1; }
.result-name {
  font-size: clamp(26px, 5vw, 36px);
  font-weight: 900; line-height: 1.1;
  background: linear-gradient(135deg, #f0abfc, #a78bfa, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.result-tagline {
  font-size: 14px; color: rgba(255,255,255,.6);
  font-style: italic; margin-top: 3px;
}

.result-body { padding: 28px 32px 32px; }

.result-desc {
  font-size: 16px; line-height: 1.7;
  color: rgba(255,255,255,.82); margin-bottom: 20px;
}
.result-traits {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
}
.trait {
  background: rgba(139,92,246,.15);
  border: 1px solid rgba(139,92,246,.25);
  border-radius: 20px; padding: 5px 14px;
  font-size: 13px; color: #c4b5fd; font-weight: 500;
}

.result-famous {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px; padding: 14px 18px;
  font-size: 14px; color: rgba(255,255,255,.55);
  margin-bottom: 28px;
}
.result-famous b { color: rgba(255,255,255,.8); }

.result-actions {
  display: flex; gap: 12px; flex-wrap: wrap;
}

/* ── SHARE MAIN BUTTON with sparkle shimmer ── */
.btn-share-main {
  flex: 1; min-width: 160px;
  padding: 15px 24px; font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, #f0abfc, #a78bfa, #60a5fa);
  background-size: 200% 200%;
  border: none; border-radius: 16px; color: #fff; cursor: pointer;
  font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  position: relative; overflow: hidden;
  box-shadow: 0 4px 24px rgba(167,139,250,.5);
  animation: shareGlow 2.4s ease-in-out infinite, shareBgShift 3s ease-in-out infinite;
  transition: transform .15s, box-shadow .15s;
}
.btn-share-main::before {
  content: '';
  position: absolute; top: -50%; left: -75%;
  width: 50%; height: 200%;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.45) 50%, transparent 70%);
  animation: shareShimmer 2.4s ease-in-out infinite;
  pointer-events: none;
}
.btn-share-main:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 8px 36px rgba(167,139,250,.7);
}
.btn-share-main:active { transform: scale(.97); }
@keyframes shareGlow {
  0%,100% { box-shadow: 0 4px 24px rgba(167,139,250,.5); }
  50%      { box-shadow: 0 4px 40px rgba(240,171,252,.8), 0 0 20px rgba(167,139,250,.4); }
}
@keyframes shareBgShift {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}
@keyframes shareShimmer {
  0%   { left: -75%; }
  60%,100% { left: 125%; }
}

/* ── RETRY BUTTON with paw bounce ── */
.btn-retry {
  flex: 1; min-width: 140px;
  padding: 15px 24px; font-size: 15px; font-weight: 700;
  background: linear-gradient(135deg, #7c3aed, #3b82f6);
  border: none; border-radius: 16px; color: #fff; cursor: pointer;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(124,58,237,.4);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .15s, box-shadow .15s;
  animation: retryWiggle 3.5s ease-in-out infinite;
}
.btn-retry .paw-icon {
  display: inline-block;
  animation: pawBounce 3.5s ease-in-out infinite;
}
.btn-retry:hover { transform: translateY(-3px); box-shadow: 0 6px 30px rgba(124,58,237,.65); }
.btn-retry:active { transform: scale(.97); }
@keyframes retryWiggle {
  0%,88%,100% { transform: translateY(0) rotate(0deg); }
  91%   { transform: translateY(-4px) rotate(-3deg); }
  94%   { transform: translateY(0) rotate(3deg); }
  97%   { transform: translateY(-2px) rotate(-1deg); }
}
@keyframes pawBounce {
  0%,85%,100% { transform: scale(1) rotate(0deg); }
  89%   { transform: scale(1.4) rotate(-15deg); }
  93%   { transform: scale(1) rotate(10deg); }
  97%   { transform: scale(1.15) rotate(-5deg); }
}

/* copy toast */
.toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(30,30,50,.95); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,.12); border-radius: 12px;
  padding: 12px 24px; font-size: 14px; color: #fff;
  opacity: 0; transition: all .3s ease; pointer-events: none; z-index: 100;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="orb orb4"></div>

<div id="app">

  <!-- ══ START SCREEN ══ -->
  <div id="startScreen" class="screen active">

    <!-- КАРУСЕЛЬ -->
    <div class="carousel-outer">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>

    <div class="glass start-card">
      <div class="logo-cats">🐱</div>
      <div class="quiz-title">Какой ты кот?</div>
      <div class="quiz-subtitle">Узнай своего кота-двойника из мира 2026 года</div>
      <div class="quiz-meta">
        <div class="meta-badge"><span>❓</span> 12 вопросов</div>
        <div class="meta-badge"><span>⚡</span> 3 минуты</div>
        <div class="meta-badge"><span>🐾</span> 8 типов котов</div>
      </div>
      <button class="btn-start" onclick="startQuiz()">
        <span>🐾</span> Начать квиз
      </button>
      <div class="vk-credit">Сообщество <a href="#">ИИ Коты всегда рядом</a> · ВКонтакте</div>
    </div>
  </div>

  <!-- ══ QUIZ SCREEN ══ -->
  <div id="quizScreen" class="screen">
    <div class="glass quiz-card">
      <div class="progress-wrap">
        <div class="progress-text" id="progressText">1 / 12</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width:8%"></div>
        </div>
      </div>
      <div class="q-number" id="qNumber">ВОПРОС 1</div>
      <div class="q-text" id="qText">Загрузка...</div>
      <div class="answers-grid" id="answersGrid"></div>
    </div>
  </div>

  <!-- ══ LOADING SCREEN ══ -->
  <div id="loadingScreen" class="screen">
    <div class="glass loading-card">
      <div class="loading-cats">🐱</div>
      <div class="loading-text">Считаем твои ответы...</div>
      <div class="loading-sub">Ищем твоего кота-двойника в мире 2026 года</div>
    </div>
  </div>

  <!-- ══ RESULT SCREEN ══ -->
  <div id="resultScreen" class="screen">
    <div class="glass result-card">
      <div class="result-image-wrap">
        <img id="resultImg" src="" alt="Твой кот" loading="lazy">
        <div class="result-image-overlay"></div>
        <div class="result-type-badge" id="resultBadge">Твой тип</div>
        <div class="result-name-overlay">
          <div class="result-emoji-big" id="resultEmoji"></div>
          <div class="result-name" id="resultName"></div>
          <div class="result-tagline" id="resultTagline"></div>
        </div>
      </div>
      <div class="result-body">
        <div class="result-desc" id="resultDesc"></div>
        <div class="result-traits" id="resultTraits"></div>
        <div class="result-famous" id="resultFamous"></div>
        <div class="result-actions">
          <button class="btn-share-main" onclick="copyResult()">
            ✨ Поделиться результатом
          </button>
          <button class="btn-retry" onclick="retryQuiz()">
            <span class="paw-icon">🐾</span> Пройти снова
          </button>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast">✅ Скопировано в буфер обмена!</div>

<script>
// ─────────────────────────────────────────────
//  QUIZ DATA
// ─────────────────────────────────────────────

// Score keys: owner, advent, knight, philos, stubborn, hedon, intel, peace
// Balanced distribution: each type appears exactly 6 times across 48 answer slots
// Q1:owner/knight/philos/hedon  Q2:intel/advent/stubborn/peace  Q3:owner/knight/philos/hedon
// Q4:advent/stubborn/intel/hedon  Q5:owner/knight/philos/peace  Q6:advent/intel/hedon/peace
// Q7:owner/stubborn/intel/peace  Q8:advent/knight/philos/hedon  Q9:knight/stubborn/intel/peace
// Q10:owner/advent/stubborn/philos  Q11:advent/knight/stubborn/peace  Q12:owner/philos/intel/hedon
const QUESTIONS = [
  {
    text: "Как вы обычно встречаете утро в выходной день?",
    answers: [
      { text: "Уже с 7 утра что-то делаю — запасы проверить, что-то починить", key: "owner" },
      { text: "Бодро встаю — надо успеть всё и везде", key: "knight" },
      { text: "Лежу и медленно думаю о смысле происходящего", key: "philos" },
      { text: "Никуда не спешу — сплю сколько хочу, завтрак в постель", key: "hedon" },
    ]
  },
  {
    text: "Что-то пошло не по плану. Ваша первая реакция?",
    answers: [
      { text: "Анализирую ситуацию — ищу, где именно всё сломалось", key: "intel" },
      { text: "Быстро нахожу запасной вариант, желательно выгоднее первого", key: "advent" },
      { text: "Злюсь ровно минуту — и продолжаю действовать", key: "stubborn" },
      { text: "Стараюсь сохранять спокойствие и поддержать тех, кто рядом", key: "peace" },
    ]
  },
  {
    text: "Идеальный вечер пятницы — это...",
    answers: [
      { text: "Дома, что-то мастерю или готовлю — всё под контролем", key: "owner" },
      { text: "Активный отдых — движение, прогулка, встреча с друзьями", key: "knight" },
      { text: "Книга, тишина и глубокие размышления о чём-то важном", key: "philos" },

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let currentQ = 0;
let scores = { owner:0, advent:0, knight:0, philos:0, stubborn:0, hedon:0, intel:0, peace:0 };
let resultKey = '';

// ─────────────────────────────────────────────
//  SCREEN MANAGEMENT
// ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById(id);
  el.style.display = 'block';
  requestAnimationFrame(() => el.classList.add('active'));
}

// ─────────────────────────────────────────────
//  QUIZ LOGIC
// ─────────────────────────────────────────────
function startQuiz() {
  currentQ = 0;
  scores = { owner:0, advent:0, knight:0, philos:0, stubborn:0, hedon:0, intel:0, peace:0 };
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion(direction = 'in') {
  const q = QUESTIONS[currentQ];
  const qText = document.getElementById('qText');
  const grid = document.getElementById('answersGrid');
  const total = QUESTIONS.length;

  // Update progress
  document.getElementById('progressText').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentQ + 1) / total) * 100}%`;
  document.getElementById('qNumber').textContent = `ВОПРОС ${currentQ + 1}`;

  // Animate out then in
  qText.classList.add('changing');
  grid.classList.add('changing');

  setTimeout(() => {
    qText.textContent = q.text;
    grid.innerHTML = '';
    const letters = ['А', 'Б', 'В', 'Г'];
    q.answers.forEach((ans, i) => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.innerHTML = `<span class="answer-letter">${letters[i]}</span>${ans.text}`;
      btn.onclick = () => selectAnswer(ans.key, btn);
      grid.appendChild(btn);
    });
    qText.classList.remove('changing');
    grid.classList.remove('changing');
  }, 220);
}

function selectAnswer(key, btn) {
  // Prevent double click
  if (btn.classList.contains('selected')) return;
  document.querySelectorAll('.answer-btn').forEach(b => b.style.pointerEvents = 'none');
  btn.classList.add('selected');
  scores[key]++;

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      calculateResult();
    }
  }, 380);
}

function calculateResult() {
  showScreen('loadingScreen');
  setTimeout(() => {
    resultKey = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
    showResult();
  }, 1800);
}

function showResult() {
  const r = RESULTS[resultKey];
  document.getElementById('resultImg').src = r.img;
  document.getElementById('resultBadge').textContent = r.badge;
  document.getElementById('resultEmoji').textContent = r.emoji;
  document.getElementById('resultName').textContent = r.name;
  document.getElementById('resultTagline').textContent = r.tagline;
  document.getElementById('resultDesc').textContent = r.desc;
  document.getElementById('resultFamous').innerHTML = r.famous;

  const traitsEl = document.getElementById('resultTraits');
  traitsEl.innerHTML = r.traits.map(t => `<span class="trait">${t}</span>`).join('');

  showScreen('resultScreen');
}

function retryQuiz() { startQuiz(); }

// ─────────────────────────────────────────────
//  SHARE
// ─────────────────────────────────────────────
function copyResult() {
  const r = RESULTS[resultKey];
  const text = `Я прошёл квиз «Какой ты кот?» — и я ${r.emoji} ${r.name}!\n${r.tagline}\n\n${r.desc}\n\n🐾 Узнай своего кота-двойника → https://vk.com/club231698113\nПодписывайся — каждую неделю новые игры и посты!\n\n#КакойТыКот #ИИКотыВсегдаРядом`;
  navigator.clipboard.writeText(text).then(() => showToast('✅ Скопировано — делись с друзьями!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ Скопировано — делись с друзьями!');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
